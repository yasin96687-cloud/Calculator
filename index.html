<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title >Calculator App Dv.YASIN</title>
  <link rel="stylesheet" href="styel.css">
</head>
<body>
   
      <div class="calculator">
        <input type="text" placeholder="0" id="calculator">

      <div class="btn">
        <button class="btn-color-2">AC</button>
        <button class="btn-color-2" >DEL</button>
        <button class="btn-color-2">%</button>
        <button class="btn-color">/</button>
      </div>
      <div class="btn">
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="btn-color">*</button>
      </div>
      <div class="btn">
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="btn-color">-</button>
      </div>
      <div class="btn">
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="btn-color">+</button>
      </div>
      <div class="btn">
        <button>00</button>
        <button>0</button>
        <button >.</button>
        <button class="btn-color-3">=</button>
      </div>
      </div>












<script src="./Script.js"></script>
</body>
</html>
